configure {
    policy-options {
        community "rt-vprn101" {
            member "target:65100:101" { }
        }
        prefix-list "default" {
            prefix 0.0.0.0/0 type exact {
            }
        }
        prefix-list "lo0" {
            prefix 10.255.101.1/32 type exact {
            }
        }
        prefix-list "system" {
            prefix 10.0.0.50/32 type exact {
            }
        }
        policy-statement "export-system" {
            entry 10 {
                from {
                    prefix-list ["system"]
                }
                to {
                    protocol {
                        name [bgp-label]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "vprn101-export" {
            entry 10 {
                from {
                    prefix-list ["default"]
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                    community {
                        add ["rt-vprn101"]
                    }
                }
            }
            default-action {
                action-type reject
            }
        }
    }
    port 1/1/c1 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c1/1 {
        admin-state enable
        ethernet {
            mode hybrid
        }
    }
    router "Base" {
        autonomous-system 1257
        interface "p1" {
            port 1/1/c1/1:1
            ipv4 {
                primary {
                    address 10.33.49.50
                    prefix-length 24
                }
            }
        }
        interface "system" {
            ipv4 {
                primary {
                    address 10.0.0.50
                    prefix-length 32
                }
            }
        }
        bgp {
            min-route-advertisement 1
            inter-as-vpn true
            advertise-inactive true
            rapid-withdrawal true
            peer-ip-tracking true
            ebgp-default-reject-policy {
                import false
                export false
            }
            rapid-update {
                evpn true
            }
            export {
                policy ["export-system"]
            }
            group "ipbb" {
                peer-as 1257
                family {
                    vpn-ipv4 true
                }
                local-as {
                    as-number 1257
                }
            }
            neighbor "10.0.0.49" {
                group "ipbb"
            }
        }
        isis 0 {
            admin-state enable
            level-capability 2
            lsp-lifetime 65535
            area-address [00.0001]
            graceful-restart {
            }
            overload-on-boot {
                timeout 300
            }
            lsp-refresh {
                interval 65000
            }
            timers {
                spf-wait {
                    spf-max-wait 5000
                    spf-initial-wait 50
                    spf-second-wait 200
                }
                lsp-wait {
                    lsp-initial-wait 50
                    lsp-second-wait 200
                }
            }
            loopfree-alternate {
                augment-route-table true
                remote-lfa {
                }
            }
            interface "p1" {
                interface-type point-to-point
            }
            interface "system" {
            }
            level 2 {
                wide-metrics-only true
            }
        }
        ldp {
            interface-parameters {
                interface "p1" {
                    ipv4 {
                    }
                }
            }
        }
    }
    service {
        vprn "101" {
            admin-state enable
            customer "1"
            bgp-ipvpn {
                mpls {
                    admin-state enable
                    route-distinguisher "10.0.0.50:101"
                    vrf-target {
                        import-community "target:65100:101"
                        export-community "target:65100:101"
                    }
                    vrf-export {
                        policy ["vprn101-export"]
                    }
                    auto-bind-tunnel {
                        resolution filter
                        resolution-filter {
                            ldp true
                        }
                    }
                }
            }
            aggregates {
                aggregate 0.0.0.0/0 {
                    blackhole {
                    }
                }
            }
            interface "lo0" {
                admin-state enable
                loopback true
                ipv4 {
                    primary {
                        address 10.255.101.1
                        prefix-length 32
                    }
                }
            }
        }
    }
}
